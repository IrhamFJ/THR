<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Penerimaan THR 2026 🌙</title>
    <style>
        body { margin: 0; padding: 0; background: #f0fdf4; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        
        /* Panggil file amplop.png lo */
        #envelope { 
            width: 180px; 
            cursor: pointer; 
            position: absolute; 
            transition: all 0.2s ease; 
            z-index: 10; 
        }
        
        /* Layar Prank Fullscreen */
        #prank-screen { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: black; 
            z-index: 100; 
            justify-content: center; 
            align-items: center; 
            flex-direction: column; 
        }
        #prank-screen img { width: 100%; height: 100%; object-fit: contain; }
        
        /* Loading Palsu */
        #loading-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: white; 
            z-index: 50; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }
        .spinner { 
            border: 4px solid #f3f3f3; 
            border-top: 4px solid #15803d; 
            border-radius: 50%; 
            width: 40px; height: 40px; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="intro">
        <h1 style="color: #15803d;">Selamat Lebaran! 🌙</h1>
        <p style="color: #166534;">Ketuk amplop di bawah untuk klaim THR kamu.</p>
    </div>

    <img id="envelope" src="amplop.png" alt="Amplop THR">

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="status-text" style="margin-top: 15px; font-weight: bold; color: #15803d;">Menghubungkan ke server bank...</p>
    </div>

    <div id="prank-screen" onclick="location.reload()">
        <img src="monyet-memberikan-jari-tengah-kepada-orang-orang.jpg">
        <h1 style="color: white; position: absolute; bottom: 20px; font-size: 1.5rem;">CIE KENA PRANK! 🐒</h1>
    </div>

    <script>
        const env = document.getElementById('envelope');
        const loading = document.getElementById('loading-overlay');
        const statusText = document.getElementById('status-text');
        const prank = document.getElementById('prank-screen');
        
        // Suara ketawa monyet nyebelin
        const prankSound = new Audio('https://www.myinstants.com/media/sounds/monkey-laugh.mp3');

        let count = 0;
        const move = () => {
            if (count < 3) {
                env.style.left = Math.random() * (window.innerWidth - 180) + 'px';
                env.style.top = Math.random() * (window.innerHeight - 180) + 'px';
                count++;
            }
        };

        // Amplop lari pas didekati
        env.addEventListener('mouseover', move);
        env.addEventListener('touchstart', move);

        // Eksekusi pas diklik beneran
        env.addEventListener('click', () => {
            loading.style.display = 'flex';
            
            // Animasi teks biar meyakinkan
            setTimeout(() => { statusText.innerText = "Memverifikasi ID Penerima..."; }, 1000);
            setTimeout(() => { statusText.innerText = "Mengirim saldo Rp 500.000..."; }, 2500);

            setTimeout(() => {
                loading.style.display = 'none';
                prank.style.display = 'flex';
                document.title = "CIE KENA PRANK! 😜";
                
                // Play sound
                prankSound.play().catch(e => console.log("Audio play blocked"));

                // Getar HP
                if (navigator.vibrate) navigator.vibrate([500, 100, 500]);

                // Fullscreen Otomatis
                const elem = document.documentElement;
                if (elem.requestFullscreen) elem.requestFullscreen();
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
            }, 4500); // 4.5 detik nunggu biar greget
        });
    </script>
</body>
</html>
